; Tiberian Dawn unit/structure stats in Red Alert rules.ini format.
;
; TD ships NO rules.ini -- the original hardcodes these in the executable
; (UDATA/IDATA/BDATA/WDATA.CPP). This file re-expresses the core TD roster in
; the format our Rules loader already understands, so the shared sim (movement,
; combat, economy, production) runs on TD data. Values are the classic TD stats;
; approximate where the RA loader has no matching field. Personal use only.
;
; Speed= is TD "MPH" (scaled *256/100 to leptons/tick). Owner= gdi|nod|gdi,nod.

[General]
